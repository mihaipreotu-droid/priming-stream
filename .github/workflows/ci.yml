name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: tests (windows, py3.12)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (editable + dev extras)
        run: pip install -e ".[dev]"

      - name: Run test suite
        # Default suite is hermetic (no `prime init`, no model download): the
        # real-embedding tests (RUN_VEC_TESTS) and real-daemon-subprocess tests
        # (RUN_DAEMON_TESTS) are opt-in and stay skipped here.
        run: pytest -q
